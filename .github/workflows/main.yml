name: CI devops 2025

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

  workflow_dispatch:
    inputs:
      deploy:
        description: "Launch deploy job"
        required: true
        default: true
        type: boolean


# =========================
# TESTS
# =========================
jobs:
  test-backend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Build and test
        working-directory: ./api
        run: mvn -B verify


# =========================
# SONAR
# =========================
  sonar-analysis:
    needs: test-backend
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Sonar analysis
        working-directory: ./api
        run: |
          mvn -B -DskipTests compile sonar:sonar \
            -Dsonar.projectKey=Grimortel_efrei-devops \
            -Dsonar.organization=grimortel \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}


# =========================
# BUILD BACKEND
# =========================
  build-backend-image:
    needs: sonar-analysis
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-simple-api:sha-${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-simple-api:run-${{ github.run_number }}
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-simple-api:latest


# =========================
# BUILD DATABASE
# =========================
  build-database-image:
    needs: sonar-analysis
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build database image
        uses: docker/build-push-action@v6
        with:
          context: ./database
          file: ./database/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-database:sha-${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-database:run-${{ github.run_number }}
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-database:latest


# =========================
# BUILD HTTPD
# =========================
  build-httpd-image:
    needs: sonar-analysis
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build httpd image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-httpd:sha-${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-httpd:run-${{ github.run_number }}
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-httpd:latest


# =========================
# BUILD FRONT
# =========================
  build-front-image:
    needs: sonar-analysis
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build front image
        uses: docker/build-push-action@v6
        with:
          context: ./devops-front-main
          file: ./devops-front-main/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-front:sha-${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-front:run-${{ github.run_number }}
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-front:latest


# =========================
# DEPLOY (MANUEL UNIQUEMENT)
# =========================
  deploy:
    needs:
      - build-backend-image
      - build-database-image
      - build-httpd-image
      - build-front-image

    if: github.event_name == 'workflow_dispatch' && inputs.deploy == true

    runs-on: ubuntu-24.04
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: |
          pip install --upgrade pip
          pip install ansible-core

      - name: Install collections
        run: ansible-galaxy collection install community.docker

      - name: SSH setup
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H emeric.bouchot.takima.school >> ~/.ssh/known_hosts

      - name: Deploy app
        working-directory: ./ansible
        run: |
          ansible-playbook -i inventories/setup.yml playbook.yml \
            -e "dockerhub_username=${{ secrets.DOCKERHUB_USERNAME }} front_image_tag=sha-${{ github.sha }}"


# =========================
# ROLLBACK (SAFE VERSION)
# =========================
  rollback:
    needs:
      - test-backend
      - sonar-analysis
      - build-backend-image
      - build-database-image
      - build-httpd-image
      - build-front-image

    if: failure() && github.ref == 'refs/heads/main' && github.event_name == 'push'

    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Git config
        run: |
          git config user.email "auto-ci@github.com"
          git config user.name "auto rollback"

      - name: Revert last commit
        run: |
          git revert -n HEAD
          git commit -m "CI rollback due to failure [skip ci]"
          git push