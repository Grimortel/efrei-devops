name: CI devops 2025
on:
  #to begin you want to launch this job in main and develop
  push:
    branches: 
      - main
      - develop
  pull_request:
    branches: 
      - main
  workflow_dispatch:
    inputs:
      deploy:
        description: Launch deploy job
        required: true
        default: true
        type: boolean

jobs:
  test-backend:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

     
      - name: Build, test and Sonar analysis
        working-directory: ./api
        run: |
          mvn -B verify

  sonar-analysis:
    needs: test-backend
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Sonar analysis
        working-directory: ./api
        run: |
          mvn -B -DskipTests compile sonar:sonar \
            -Dsonar.projectKey=Grimortel_efrei-devops \
            -Dsonar.organization=grimortel \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}

  build-backend-image:
    needs: sonar-analysis
    runs-on: ubuntu-24.04
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.base_ref == 'main') || github.event_name == 'workflow_dispatch'
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build image and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/tp-devops-simple-api:sha-${{ github.sha }}
            ${{ env.DOCKERHUB_USERNAME }}/tp-devops-simple-api:run-${{ github.run_number }}
            ${{ env.DOCKERHUB_USERNAME }}/tp-devops-simple-api:latest
          push: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}

  build-database-image:
    runs-on: ubuntu-24.04
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.base_ref == 'main') || github.event_name == 'workflow_dispatch'
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build image and push database
        uses: docker/build-push-action@v6
        with:
          context: ./database
          file: ./database/Dockerfile
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/tp-devops-database:sha-${{ github.sha }}
            ${{ env.DOCKERHUB_USERNAME }}/tp-devops-database:run-${{ github.run_number }}
            ${{ env.DOCKERHUB_USERNAME }}/tp-devops-database:latest
          push: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}

  build-httpd-image:
    runs-on: ubuntu-24.04
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.base_ref == 'main') || github.event_name == 'workflow_dispatch'
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build image and push httpd
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/tp-devops-httpd:sha-${{ github.sha }}
            ${{ env.DOCKERHUB_USERNAME }}/tp-devops-httpd:run-${{ github.run_number }}
            ${{ env.DOCKERHUB_USERNAME }}/tp-devops-httpd:latest
          push: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}

  build-front-image:
    runs-on: ubuntu-24.04
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.base_ref == 'main') || github.event_name == 'workflow_dispatch'
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build image and push front
        uses: docker/build-push-action@v6
        with:
          context: ./devops-front-main
          file: ./devops-front-main/Dockerfile
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/tp-devops-front:sha-${{ github.sha }}
            ${{ env.DOCKERHUB_USERNAME }}/tp-devops-front:run-${{ github.run_number }}
            ${{ env.DOCKERHUB_USERNAME }}/tp-devops-front:latest
          push: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch' }}

  deploy:
    needs: [test-backend, sonar-analysis, build-backend-image, build-database-image, build-httpd-image, build-front-image]
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch' && inputs.deploy == true
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core

      - name: Install Ansible collection
        run: ansible-galaxy collection install community.docker

      - name: Configure SSH access
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ansible/id_rsa
          chmod 600 ansible/id_rsa
          ssh-keyscan -H emeric.bouchot.takima.school >> ~/.ssh/known_hosts

      - name: Deploy application
        working-directory: ./ansible
        run: |
          ansible-playbook -i inventories/setup.yml playbook.yml -e "dockerhub_username=${{ secrets.DOCKERHUB_USERNAME }} front_image_tag=sha-${{ github.sha }}"

  rollback:
    needs: [test-backend, sonar-analysis, build-backend-image, build-database-image, build-httpd-image, build-front-image]
    runs-on: ubuntu-24.04
    if: failure() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.email "auto-ci@github.com"
          git config --global user.name "auto rollback"

      - name: Revert to previous commit
        run: |
          git revert -n HEAD
          git commit -m "Revert: CI/CD rollback due to test failure [skip ci]"
          git push