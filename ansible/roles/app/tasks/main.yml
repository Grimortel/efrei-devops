- name: Run backend app
  docker_container:
    name: "{{ app_container_name }}"
    image: "{{ app_image }}"
    pull: true
    env:
      DB_HOST: "{{ db_container_name }}"
      DB_PORT: "{{ db_port }}"
      POSTGRES_DB: "{{ db_name }}"
      POSTGRES_USER: "{{ db_user }}"
      POSTGRES_PASSWORD: "{{ db_password }}"
    networks:
      - name: "{{ docker_network_name }}"
        aliases:
          - backend
    restart_policy: always